<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>API Bridge 控制台</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236366f1'/><text x='50' y='68' font-family='Arial' font-size='48' font-weight='bold' text-anchor='middle' fill='white'>AB</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-primary: #0a0a0f;
        --bg-secondary: #12121a;
        --bg-card: #1a1a25;
        --bg-input: #22222f;
        --border: #2a2a3a;
        --border-focus: #6366f1;
        --text-primary: #e8e8ef;
        --text-secondary: #8b8b9e;
        --text-muted: #5a5a6e;
        --accent: #6366f1;
        --accent-hover: #7c7ff7;
        --accent-glow: rgba(99, 102, 241, 0.3);
        --success: #22c55e;
        --success-bg: rgba(34, 197, 94, 0.1);
        --warning: #f59e0b;
        --danger: #ef4444;
        --danger-bg: rgba(239, 68, 68, 0.1);
        --radius: 12px;
        --radius-sm: 8px;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Inter', system-ui, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
      }

      /* Header */
      .header {
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border);
        padding: 0 24px;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .logo {
        width: 32px;
        height: 32px;
        background: linear-gradient(135deg, var(--accent), #a855f7);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 14px;
        color: white;
      }

      .header-title {
        font-size: 16px;
        font-weight: 600;
      }

      .status-badge {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 12px;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: 16px;
        font-size: 12px;
        color: var(--text-secondary);
      }

      .status-badge.running {
        background: var(--success-bg);
        border-color: rgba(34, 197, 94, 0.3);
        color: var(--success);
      }

      .status-dot {
        width: 6px;
        height: 6px;
        background: var(--text-muted);
        border-radius: 50%;
      }

      .status-badge.running .status-dot {
        background: var(--success);
        animation: pulse 2s infinite;
      }

      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

      /* Main */
      .main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px;
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr 340px;
        gap: 20px;
      }

      @media(max-width:800px) { .layout{grid-template-columns:1fr;} }

      /* Cards */
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
      }

      .card-header {
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .card-title {
        font-size: 14px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .card-title svg { width: 18px; height: 18px; color: var(--accent); }

      .card-body { padding: 18px; }

      /* Provider Tabs */
      .provider-tabs {
        display: flex;
        gap: 6px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }

      .provider-tab {
        padding: 6px 14px;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
        transition: all .15s;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .provider-tab:hover { border-color: var(--accent); }

      .provider-tab.active {
        background: rgba(99,102,241,.1);
        border-color: var(--accent);
        color: var(--accent);
      }

      .provider-tab .add-icon {
        width: 14px;
        height: 14px;
        opacity: .6;
      }

      /* Form */
      .form-group {
        margin-bottom: 14px;
      }

      .form-label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        color: var(--text-secondary);
        margin-bottom: 5px;
        text-transform: uppercase;
        letter-spacing: .5px;
      }

      .form-input {
        width: 100%;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px 12px;
        font-size: 13px;
        color: var(--text-primary);
        font-family: 'JetBrains Mono', monospace;
        outline: none;
        transition: border-color .15s;
      }

      .form-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px var(--accent-glow);
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: end;
      }

      /* Model Grid */
      .model-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 6px;
        margin-bottom: 14px;
      }

      .model-chip {
        background: var(--bg-input);
        border: 2px solid var(--border);
        border-radius: 6px;
        padding: 8px;
        text-align: center;
        cursor: pointer;
        transition: all .15s;
        font-size: 12px;
        font-weight: 500;
      }

      .model-chip:hover { border-color: var(--accent); }

      .model-chip.selected {
        border-color: var(--accent);
        background: rgba(99,102,241,.1);
        color: var(--accent);
      }

      .model-chip input { display: none; }

      /* Buttons */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 9px 18px;
        font-size: 13px;
        font-weight: 600;
        font-family: inherit;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: all .15s;
      }

      .btn svg { width: 16px; height: 16px; }

      .btn-primary { background: var(--accent); color: #fff; }
      .btn-primary:hover { background: var(--accent-hover); }

      .btn-secondary {
        background: var(--bg-input);
        color: var(--text-secondary);
        border: 1px solid var(--border);
      }
      .btn-secondary:hover { background: var(--border); color: var(--text-primary); }

      .btn-danger {
        background: var(--danger-bg);
        color: var(--danger);
        border: 1px solid rgba(239,68,68,.2);
      }
      .btn-danger:hover { background: rgba(239,68,68,.2); }

      .btn-sm { padding: 6px 10px; font-size: 12px; }

      .btn-block { width: 100%; }

      .btn-group { display: flex; gap: 8px; margin-top: 16px; }
      .btn-group .btn { flex: 1; }

      /* Sidebar */
      .sidebar { display: flex; flex-direction: column; gap: 16px; }

      /* Status */
      .status-list { display: flex; flex-direction: column; gap: 8px; }

      .status-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 13px;
      }

      .status-item .label { color: var(--text-secondary); }
      .status-item .value { font-weight: 500; }
      .status-item .value.active { color: var(--success); }

      /* Logs */
      .log-box {
        height: 240px;
        overflow: auto;
        padding: 12px;
        background: #0d0d14;
        border-radius: 6px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        line-height: 1.7;
        color: var(--text-secondary);
        white-space: pre-wrap;
      }

      .log-box::-webkit-scrollbar { width: 5px; }
      .log-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

      .log-line.error { color: var(--danger); }
      .log-line.success { color: var(--success); }
      .log-line.warning { color: var(--warning); }

      .log-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--text-muted);
        font-size: 12px;
      }

      /* Modal */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,.6);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 200;
        opacity: 0;
        pointer-events: none;
        transition: opacity .2s;
      }

      .modal-overlay.show { opacity: 1; pointer-events: auto; }

      .modal {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 24px;
        width: 400px;
        max-width: 90vw;
      }

      .modal-title {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 16px;
      }

      .modal-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        margin-top: 20px;
      }

      /* Toast */
      .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: var(--bg-card);
        border: 1px solid var(--success);
        border-radius: 8px;
        padding: 12px 16px;
        font-size: 13px;
        color: var(--success);
        transform: translateY(80px);
        opacity: 0;
        transition: all .3s;
        z-index: 300;
      }

      .toast.show { transform: translateY(0); opacity: 1; }
      .toast.error { border-color: var(--danger); color: var(--danger); }
      .toast.warning { border-color: var(--warning); color: var(--warning); }

      /* Checkbox */
      .checkbox-group {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 14px;
      }

      .checkbox-group input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--accent);
      }

      .checkbox-group label {
        font-size: 13px;
        color: var(--text-secondary);
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo">AB</div>
        <span class="header-title">API Bridge</span>
      </div>
      <div class="status-badge" id="statusBadge">
        <span class="status-dot"></span>
        <span id="statusText">未运行</span>
      </div>
    </header>

    <!-- Main -->
    <main class="main">
      <div class="layout">
        <!-- Left: Config -->
        <div>
          <div class="card">
            <div class="card-header">
              <span class="card-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                厂商配置
              </span>
            </div>
            <div class="card-body">
              <!-- Provider Tabs -->
              <div class="provider-tabs" id="providerTabs">
                {% for id, p in providers.items() %}
                <div class="provider-tab {% if selected_provider == id %}active{% endif %}" data-id="{{ id }}">
                  {{ p.name }}
                </div>
                {% endfor %}
                <div class="provider-tab" id="addProviderBtn" title="添加厂商">
                  <svg class="add-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </div>
              </div>

              <!-- Provider Form -->
              <form id="configForm" method="post" action="/save">
                <input type="hidden" name="provider" id="selectedProvider" value="{{ selected_provider }}">

                <div id="providerFields">
                  {% for id, p in providers.items() %}
                  <div class="provider-config" data-provider="{{ id }}" style="display:{% if selected_provider == id %}block{% else %}none{% endif %}">
                    <div class="form-group">
                      <label class="form-label">API URL</label>
                      <input class="form-input" name="url" value="{{ p.get('url', '') }}" placeholder="https://api.example.com/v1">
                    </div>
                    <div class="form-group">
                      <label class="form-label">API Key</label>
                      <input class="form-input" name="key" type="password" value="{{ p.get('key', '') }}" placeholder="sk-...">
                    </div>
                    <div class="form-group">
                      <label class="form-label">模型列表端点（用于自动拉取）</label>
                      <div class="form-row">
                        <input class="form-input" name="models_endpoint" value="{{ p.get('models_endpoint', '') }}" placeholder="/models">
                        <button type="button" class="btn btn-secondary btn-sm fetch-models-btn" data-provider="{{ id }}">
                          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                          拉取
                        </button>
                      </div>
                    </div>
                    <div class="form-group">
                      <label class="form-label">工作目录（Claude 启动位置）</label>
                      <input class="form-input" name="cwd" value="{{ p.get('cwd', '') }}" placeholder="留空则使用默认目录">
                    </div>

                    <div class="form-label">模型</div>
                    <div class="model-grid">
                      {% for m in p.get('models', []) %}
                      <label class="model-chip {% if selected_model == m.id %}selected{% endif %}">
                        <input type="radio" name="model" value="{{ m.id }}" {% if selected_model == m.id %}checked{% endif %}>
                        {{ m.label }}
                      </label>
                      {% endfor %}
                    </div>

                    <div style="display:flex;gap:6px;margin-bottom:14px;">
                      <button type="button" class="btn btn-secondary btn-sm edit-provider-btn" data-provider="{{ id }}">编辑厂商</button>
                      <button type="button" class="btn btn-danger btn-sm delete-provider-btn" data-provider="{{ id }}">删除</button>
                    </div>
                  </div>
                  {% endfor %}
                </div>

                <div class="btn-group">
                  <button type="submit" class="btn btn-secondary">保存配置</button>
                  <button type="button" id="startBtn" class="btn btn-primary">启动 Claude</button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <!-- Right: Sidebar -->
        <div class="sidebar">
          <!-- Controls -->
          <div class="card">
            <div class="card-header">
              <span class="card-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                运行状态
              </span>
            </div>
            <div class="card-body">
              <div class="status-list">
                <div class="status-item">
                  <span class="label">厂商</span>
                  <span class="value" id="stProvider">-</span>
                </div>
                <div class="status-item">
                  <span class="label">模型</span>
                  <span class="value" id="stModel">-</span>
                </div>
                <div class="status-item">
                  <span class="label">Bridge</span>
                  <span class="value" id="stBridge">-</span>
                </div>
                <div class="status-item">
                  <span class="label">Claude</span>
                  <span class="value" id="stClaude">-</span>
                </div>
              </div>
              <button type="button" id="stopBtn" class="btn btn-danger btn-block" style="margin-top:14px;">停止全部</button>
            </div>
          </div>

          <!-- Logs -->
          <div class="card" style="flex:1;">
            <div class="card-header">
              <span class="card-title">日志</span>
            </div>
            <div class="card-body" style="padding:0;">
              <div class="log-box" id="logs">
                <div class="log-empty">等待启动...</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Add/Edit Provider Modal -->
    <div class="modal-overlay" id="providerModal">
      <div class="modal">
        <div class="modal-title" id="modalTitle">添加厂商</div>
        <input type="hidden" id="modalProviderId" value="">
        <div class="form-group">
          <label class="form-label">厂商 ID</label>
          <input class="form-input" id="modalId" placeholder="my-provider">
        </div>
        <div class="form-group">
          <label class="form-label">显示名称</label>
          <input class="form-input" id="modalName" placeholder="我的 API">
        </div>
        <div class="form-group">
          <label class="form-label">描述</label>
          <input class="form-input" id="modalDesc" placeholder="直连 / 通过 Bridge">
        </div>
        <div class="form-group">
          <label class="form-label">API URL</label>
          <input class="form-input" id="modalUrl" placeholder="https://api.example.com/v1">
        </div>
        <div class="form-group">
          <label class="form-label">API Key</label>
          <input class="form-input" id="modalKey" type="password" placeholder="sk-...">
        </div>
        <div class="form-group">
          <label class="form-label">模型端点</label>
          <input class="form-input" id="modalEndpoint" placeholder="/models（留空则不支持拉取）">
        </div>
        <div class="form-group">
          <label class="form-label">工作目录</label>
          <input class="form-input" id="modalCwd" placeholder="Claude 启动位置，留空用默认">
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="modalBridge">
          <label for="modalBridge">需要本地 Bridge 代理</label>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="modalCancel">取消</button>
          <button type="button" class="btn btn-primary" id="modalSave">保存</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      const $ = s => document.querySelector(s);
      const $$ = s => document.querySelectorAll(s);

      // Provider tab switching
      $$('.provider-tab[data-id]').forEach(tab => {
        tab.addEventListener('click', () => {
          const id = tab.dataset.id;
          $$('.provider-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          $('#selectedProvider').value = id;
          $$('.provider-config').forEach(c => c.style.display = c.dataset.provider === id ? 'block' : 'none');
        });
      });

      // Model selection
      document.addEventListener('click', e => {
        const chip = e.target.closest('.model-chip');
        if (!chip) return;
        const parent = chip.closest('.provider-config');
        parent.querySelectorAll('.model-chip').forEach(c => c.classList.remove('selected'));
        chip.classList.add('selected');
        chip.querySelector('input').checked = true;
      });

      // Fetch models
      $$('.fetch-models-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const provider = btn.dataset.provider;
          btn.disabled = true;
          btn.textContent = '拉取中...';

          const form = new FormData();
          form.append('provider', provider);

          try {
            const res = await fetch('/api/models/fetch', { method: 'POST', body: form });
            const data = await res.json();
            if (data.error) {
              showToast(data.error, 'error');
            } else {
              showToast(`已拉取 ${data.models.length} 个模型`);
              setTimeout(() => location.reload(), 500);
            }
          } catch (e) {
            showToast('拉取失败', 'error');
          }
          btn.disabled = false;
          btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> 拉取';
        });
      });

      // Add provider
      $('#addProviderBtn').addEventListener('click', () => {
        $('#modalTitle').textContent = '添加厂商';
        $('#modalProviderId').value = '';
        $('#modalId').value = '';
        $('#modalId').disabled = false;
        $('#modalName').value = '';
        $('#modalDesc').value = '';
        $('#modalUrl').value = '';
        $('#modalKey').value = '';
        $('#modalEndpoint').value = '/models';
        $('#modalBridge').checked = false;
        $('#providerModal').classList.add('show');
      });

      // Edit provider
      $$('.edit-provider-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.provider;
          const tab = $(`.provider-tab[data-id="${id}"]`);
          const config = $(`.provider-config[data-provider="${id}"]`);

          $('#modalTitle').textContent = '编辑厂商';
          $('#modalProviderId').value = id;
          $('#modalId').value = id;
          $('#modalId').disabled = true;
          $('#modalName').value = tab ? tab.textContent.trim() : id;
          $('#modalDesc').value = '';
          $('#modalUrl').value = config.querySelector('[name="url"]').value;
          $('#modalKey').value = config.querySelector('[name="key"]').value;
          $('#modalEndpoint').value = config.querySelector('[name="models_endpoint"]').value;
          $('#modalCwd').value = config.querySelector('[name="cwd"]') ? config.querySelector('[name="cwd"]').value : '';
          $('#modalBridge').checked = false;
          $('#providerModal').classList.add('show');
        });
      });

      // Delete provider
      $$('.delete-provider-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('确定删除此厂商？')) return;
          const form = new FormData();
          form.append('id', btn.dataset.provider);
          const res = await fetch('/api/provider/delete', { method: 'POST', body: form });
          const data = await res.json();
          if (data.error) showToast(data.error, 'error');
          else { showToast('已删除'); setTimeout(() => location.reload(), 500); }
        });
      });

      // Modal save
      $('#modalSave').addEventListener('click', async () => {
        const existingId = $('#modalProviderId').value;
        const isEdit = !!existingId;
        const url = isEdit ? '/api/provider/update' : '/api/provider/create';

        const form = new FormData();
        form.append('id', existingId || $('#modalId').value);
        form.append('name', $('#modalName').value);
        form.append('description', $('#modalDesc').value);
        form.append('url', $('#modalUrl').value);
        form.append('key', $('#modalKey').value);
        form.append('models_endpoint', $('#modalEndpoint').value);
        form.append('cwd', $('#modalCwd').value);
        form.append('requires_bridge', $('#modalBridge').checked ? 'true' : 'false');

        try {
          const res = await fetch(url, { method: 'POST', body: form });
          const data = await res.json();
          if (data.error) {
            showToast(data.error, 'error');
          } else {
            $('#providerModal').classList.remove('show');
            showToast(isEdit ? '已更新' : '已创建');
            setTimeout(() => location.reload(), 500);
          }
        } catch (e) {
          showToast('操作失败', 'error');
        }
      });

      $('#modalCancel').addEventListener('click', () => $('#providerModal').classList.remove('show'));

      // Start
      $('#startBtn').addEventListener('click', async () => {
        // Save config first
        const formData = new FormData($('#configForm'));
        await fetch('/save', { method: 'POST', body: formData });

        // Start
        const form = new FormData();
        form.append('provider', $('#selectedProvider').value);
        try {
          const res = await fetch('/api/start', { method: 'POST', body: form });
          const data = await res.json();
          if (data.error) showToast(data.error, 'error');
          else { showToast(`已启动 (PID: ${data.pid})`); updateStatus(); }
        } catch (e) { showToast('启动失败', 'error'); }
      });

      // Stop
      $('#stopBtn').addEventListener('click', async () => {
        const res = await fetch('/api/stop', { method: 'POST' });
        const data = await res.json();
        showToast(`已停止: ${data.stopped.join(', ') || '无'}`);
        updateStatus();
      });

      // Status
      async function updateStatus() {
        try {
          const res = await fetch('/api/status');
          const data = await res.json();
          const badge = $('#statusBadge');
          const text = $('#statusText');

          if (data.claude_running) {
            badge.classList.add('running');
            text.textContent = '运行中';
          } else {
            badge.classList.remove('running');
            text.textContent = '未运行';
          }

          $('#stBridge').textContent = data.bridge_running ? '运行中' : '未运行';
          $('#stBridge').className = data.bridge_running ? 'value active' : 'value';
          $('#stClaude').textContent = data.claude_running ? '运行中' : '未运行';
          $('#stClaude').className = data.claude_running ? 'value active' : 'value';
        } catch (e) {}
      }

      function updateStatusDisplay() {
        const provider = $('#selectedProvider').value;
        const tab = $(`.provider-tab[data-id="${provider}"]`);
        if (tab) $('#stProvider').textContent = tab.textContent.trim();

        const selected = $(`.provider-config[data-provider="${provider}"] .model-chip.selected`);
        if (selected) $('#stModel').textContent = selected.textContent.trim();
      }

      // Logs
      const logs = $('#logs');
      function connectWS() {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${proto}//${location.host}/ws/logs`);
        ws.onopen = () => { logs.innerHTML = ''; addLog('已连接', 'success'); };
        ws.onmessage = e => addLog(e.data);
        ws.onclose = () => { addLog('断开，重连...', 'warning'); setTimeout(connectWS, 3000); };
      }

      function addLog(text, type = '') {
        const empty = logs.querySelector('.log-empty');
        if (empty) empty.remove();
        const line = document.createElement('div');
        line.className = `log-line ${type}`;
        line.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
        logs.appendChild(line);
        logs.scrollTop = logs.scrollHeight;
      }

      // Toast
      function showToast(msg, type = '') {
        const t = $('#toast');
        t.textContent = msg;
        t.className = `toast show ${type}`;
        setTimeout(() => t.classList.remove('show'), 3000);
      }

      // Init
      connectWS();
      updateStatus();
      updateStatusDisplay();
      setInterval(updateStatus, 5000);
    </script>
  </body>
</html>
